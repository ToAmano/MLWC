<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f9f9f9" />

  <!-- 入力データ -->
  <rect x="50" y="50" width="250" height="80" fill="#4CAF50" stroke="#333" stroke-width="2" rx="10" />
  <text x="175" y="95" font-size="18" fill="white" text-anchor="middle">入力データ（テキスト）</text>

  <!-- 矢印 -->
  <line x1="175" y1="130" x2="175" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- トークン化 -->
  <rect x="50" y="170" width="250" height="80" fill="#FF9800" stroke="#333" stroke-width="2" rx="10" />
  <text x="175" y="215" font-size="18" fill="white" text-anchor="middle">トークン化（分割）</text>

  <!-- 矢印 -->
  <line x1="175" y1="250" x2="175" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Transformer 学習 -->
  <rect x="50" y="290" width="250" height="80" fill="#2196F3" stroke="#333" stroke-width="2" rx="10" />
  <text x="175" y="335" font-size="18" fill="white" text-anchor="middle">Transformer で学習</text>

  <!-- 矢印 -->
  <line x1="175" y1="370" x2="175" y2="410" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 損失関数の最適化 -->
  <rect x="50" y="410" width="250" height="80" fill="#9C27B0" stroke="#333" stroke-width="2" rx="10" />
  <text x="175" y="455" font-size="18" fill="white" text-anchor="middle">損失関数の最適化</text>

  <!-- 矢印 -->
  <line x1="175" y1="490" x2="175" y2="530" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 事前学習済み LLM -->
  <rect x="50" y="530" width="250" height="80" fill="#673AB7" stroke="#333" stroke-width="2" rx="10" />
  <text x="175" y="575" font-size="18" fill="white" text-anchor="middle">事前学習済み LLM</text>

  <!-- 矢印の定義 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6" fill="#333" />
    </marker>
  </defs>
</svg>
