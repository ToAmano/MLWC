name: Test if cmdlines work
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          ls
          pip install -e .
        working-directory: ${{ github.workspace }}
      - name: CPextract.py test
        run: |
          CPextract.py --help
      - name: CPmake.py test
        run: |
          CPmake.py --help
      - name: CPtrain.py test
        run: |
          CPtrain.py --help
